name: Check F* friends

# This workflow must be called ONLY after a run of build.yml
on:
  workflow_call:

defaults:
  run:
    shell: bash

jobs:
  build-krml:
    runs-on: ubuntu-latest
    container: mtzguido/dev-base
    steps:
      - name: Cleanup
        run: sudo find . -delete
      - run: echo "HOME=/home/user" >> $GITHUB_ENV
      - uses: mtzguido/set-opam-env@master

      - uses: actions/download-artifact@v4
        with:
          name: fstar.tar.gz
      - run: tar -xzf fstar.tar.gz
      - run: echo "FSTAR_EXE=$(pwd)/fstar/bin/fstar.exe" >> $GITHUB_ENV
      - run: echo "OTHERFLAGS=--proof_recovery" >> $GITHUB_ENV

      - name: Checkout karamel
        uses: actions/checkout@master
        with:
          path: karamel/
          repository: FStarLang/karamel

      - name: Build krml (minimal)
        run: make -C karamel -skj$(nproc) minimal

      # krml is a symlink to _build/default/src/Karamel.exe, but we want to exclude _build.
      # So, overwrite the link with the actual file.
      - name: Fix for symlink
        run: |
          cp --remove-destination $(realpath karamel/krml) karamel/krml

      - uses: mtzguido/gci-upload@master
        with:
          name: karamel
          extra: --exclude=karamel/_build
          hometag: KRML

  test-krml:
    runs-on: ubuntu-latest
    container: mtzguido/dev-base
    if: false # No karamel test since it needs a full build (and Low*)
    needs:
      - build-krml
    steps:
      - name: Cleanup
        run: sudo find . -delete
      - run: echo "HOME=/home/user" >> $GITHUB_ENV
      - uses: mtzguido/set-opam-env@master

      - uses: actions/download-artifact@v4
        with:
          name: fstar.tar.gz
      - run: tar -xzf fstar.tar.gz
      - run: echo "FSTAR_EXE=$(pwd)/fstar/bin/fstar.exe" >> $GITHUB_ENV
      - run: echo "OTHERFLAGS=--proof_recovery" >> $GITHUB_ENV


      # krml test needs node
      - uses: actions/setup-node@v4
        with:
          node-version: 16

      - uses: mtzguido/gci-download@master
        with:
          name: karamel

      # node is needed for the wasm tests, skip them for now
      - name: Test
        run: make -C karamel -skj$(nproc) test

  build-steel:
    runs-on: ubuntu-latest
    container: mtzguido/dev-base
    steps:
      - name: Cleanup
        run: sudo find . -delete
      - run: echo "HOME=/home/user" >> $GITHUB_ENV
      - uses: mtzguido/set-opam-env@master

      - uses: actions/download-artifact@v4
        with:
          name: fstar.tar.gz
      - run: tar -xzf fstar.tar.gz
      - run: echo "FSTAR_EXE=$(pwd)/fstar/bin/fstar.exe" >> $GITHUB_ENV
      - run: echo "OTHERFLAGS=--proof_recovery" >> $GITHUB_ENV

      - name: Checkout steel
        uses: actions/checkout@master
        with:
          path: steel/
          repository: FStarLang/steel

      - name: Build
        run: make -C steel -skj$(nproc)

      - uses: mtzguido/gci-upload@master
        with:
          name: steel
          hometag: STEEL

  build-steel-proofs:
    runs-on: ubuntu-latest
    container: mtzguido/dev-base
    needs:
      - build-krml
      - build-steel
    steps:
      - name: Cleanup
        run: sudo find . -delete
      - run: echo "HOME=/home/user" >> $GITHUB_ENV
      - uses: mtzguido/set-opam-env@master

      - uses: actions/download-artifact@v4
        with:
          name: fstar.tar.gz
      - run: tar -xzf fstar.tar.gz
      - run: echo "FSTAR_EXE=$(pwd)/fstar/bin/fstar.exe" >> $GITHUB_ENV
      - run: echo "OTHERFLAGS=--proof_recovery --z3version 4.15.3" >> $GITHUB_ENV

      - uses: mtzguido/gci-download@master
        with:
          name: karamel

      - uses: mtzguido/gci-download@master
        with:
          name: steel

      - name: Test
        run: make -C steel -skj$(nproc) verify-proofs

  test-steel:
    runs-on: ubuntu-latest
    container: mtzguido/dev-base
    needs:
      - build-krml
      - build-steel
    steps:
      - name: Cleanup
        run: sudo find . -delete
      - run: echo "HOME=/home/user" >> $GITHUB_ENV
      - uses: mtzguido/set-opam-env@master

      - uses: actions/download-artifact@v4
        with:
          name: fstar.tar.gz
      - run: tar -xzf fstar.tar.gz
      - run: echo "FSTAR_EXE=$(pwd)/fstar/bin/fstar.exe" >> $GITHUB_ENV
      - run: echo "OTHERFLAGS=--proof_recovery" >> $GITHUB_ENV

      - uses: mtzguido/gci-download@master
        with:
          name: karamel

      - uses: mtzguido/gci-download@master
        with:
          name: steel

      - name: Test
        run: make -C steel -skj$(nproc) test

  build-pulse:
    runs-on: ubuntu-latest
    container: mtzguido/dev-base
    steps:
      - name: Cleanup
        run: sudo find . -delete
      - run: echo "HOME=/home/user" >> $GITHUB_ENV
      - uses: mtzguido/set-opam-env@master

      - name: Checkout pulse
        uses: actions/checkout@master
        with:
          path: pulse/
          repository: FStarLang/pulse

      - uses: actions/download-artifact@v4
        with:
          name: fstar.tar.gz
      - run: tar -xzf fstar.tar.gz
      - run: echo "FSTAR_EXE=$(pwd)/fstar/bin/fstar.exe" >> $GITHUB_ENV
      - run: echo "OTHERFLAGS=--proof_recovery" >> $GITHUB_ENV

      - name: Build (after setting up cargo env)
        run: . $HOME/.cargo/env && make -C pulse -skj$(nproc)

      - uses: mtzguido/gci-upload@master
        with:
          name: pulse
          hometag: PULSE

  test-pulse:
    runs-on: ubuntu-latest
    container: mtzguido/dev-base
    needs:
      - build-krml
      - build-pulse
    steps:
      - name: Cleanup
        run: sudo find . -delete
      - run: echo "HOME=/home/user" >> $GITHUB_ENV
      - uses: mtzguido/set-opam-env@master

      - uses: actions/download-artifact@v4
        with:
          name: fstar.tar.gz
      - run: tar -xzf fstar.tar.gz
      - run: echo "FSTAR_EXE=$(pwd)/fstar/bin/fstar.exe" >> $GITHUB_ENV

      - uses: mtzguido/gci-download@master
        with:
          name: karamel

      - uses: mtzguido/gci-download@master
        with:
          name: pulse

      - name: Test
        run: . $HOME/.cargo/env && make -C pulse -skj$(nproc) test

  build-everparse:
    runs-on: ubuntu-latest
    container: mtzguido/dev-base
    if: false # Currently needs Low*
    needs:
      - build-krml
      - build-pulse
    steps:
      - name: Cleanup
        run: sudo find . -delete
      - run: echo "HOME=/home/user" >> $GITHUB_ENV
      - uses: mtzguido/set-opam-env@master
      - run: opam install -y hex re ctypes sha sexplib
      - run: sudo apt-get update && sudo apt-get install -y libssl-dev

      # Install rust toolchain
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/download-artifact@v4
        with:
          name: fstar.tar.gz
      - run: tar -xzf fstar.tar.gz
      - run: echo "FSTAR_EXE=$(pwd)/fstar/bin/fstar.exe" >> $GITHUB_ENV
      - run: echo "OTHERFLAGS=--proof_recovery" >> $GITHUB_ENV

      - uses: mtzguido/gci-download@master
        with:
          name: karamel

      - uses: mtzguido/gci-download@master
        with:
          name: pulse

      # everparse expects PULSE_HOME to be the root of the installation,
      # not the root of the repo
      - run: echo "PULSE_HOME=$PULSE_HOME/out" >> $GITHUB_ENV

      # everparse expects more environment variables to opt out of
      # in-tree dependencies
      - run: echo "EVERPARSE_USE_OPAMROOT=1" >> $GITHUB_ENV
      - run: echo "EVERPARSE_USE_FSTAR_EXE=1" >> $GITHUB_ENV
      - run: echo "EVERPARSE_USE_KRML_HOME=1" >> $GITHUB_ENV
      - run: echo "EVERPARSE_USE_PULSE_HOME=1" >> $GITHUB_ENV

      - name: Checkout everparse
        uses: actions/checkout@master
        with:
          path: everparse/
          ref: _nik_smt_univs_2025
          repository: project-everest/everparse

      - name: Build
        run: make -C everparse -skj$(nproc) all

      - uses: mtzguido/gci-upload@master
        with:
          name: everparse
          hometag: EVERPARSE

  test-everparse:
    runs-on: ubuntu-latest
    container: mtzguido/dev-base
    if: false # Currently needs Low*
    needs:
      - build-everparse
    steps:
      - name: Cleanup
        run: sudo find . -delete
      - run: echo "HOME=/home/user" >> $GITHUB_ENV
      - uses: mtzguido/set-opam-env@master
      - run: opam install -y hex re ctypes sha sexplib
      - run: sudo apt-get update && sudo apt-get install -y libssl-dev cmake python3-venv

      # Install rust toolchain
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/download-artifact@v4
        with:
          name: fstar.tar.gz
      - run: tar -xzf fstar.tar.gz
      - run: echo "FSTAR_EXE=$(pwd)/fstar/bin/fstar.exe" >> $GITHUB_ENV
      - run: echo "OTHERFLAGS=--proof_recovery" >> $GITHUB_ENV

      - uses: mtzguido/gci-download@master
        with:
          name: karamel

      - uses: mtzguido/gci-download@master
        with:
          name: pulse
      # everparse expects PULSE_HOME to be the root of the installation,
      # not the root of the repo
      - run: echo "PULSE_HOME=$PULSE_HOME/out" >> $GITHUB_ENV

      - uses: mtzguido/gci-download@master
        with:
          name: everparse

      # everparse expects more environment variables to opt out of
      # in-tree dependencies
      - run: echo "EVERPARSE_USE_OPAMROOT=1" >> $GITHUB_ENV
      - run: echo "EVERPARSE_USE_FSTAR_EXE=1" >> $GITHUB_ENV
      - run: echo "EVERPARSE_USE_KRML_HOME=1" >> $GITHUB_ENV
      - run: echo "EVERPARSE_USE_PULSE_HOME=1" >> $GITHUB_ENV

      - name: Test
        # NOTE: We do not check against the expected C/Rust
        # outputs, they are too noisy (they have gensym'd names) and do
        # not really indicate a failure.
        run: make -C everparse -skj$(nproc) test EVERPARSE_NO_DIFF=1

  starmalloc:
    runs-on: ubuntu-latest
    container: mtzguido/dev-base
    needs:
      - build-krml
      - build-steel
    steps:
      - name: Cleanup
        run: sudo find . -delete
      - run: echo "HOME=/home/user" >> $GITHUB_ENV
      - uses: mtzguido/set-opam-env@master

      - uses: actions/download-artifact@v4
        with:
          name: fstar.tar.gz
      - run: tar -xzf fstar.tar.gz
      - run: echo "FSTAR_EXE=$(pwd)/fstar/bin/fstar.exe" >> $GITHUB_ENV
      - run: echo "OTHERFLAGS=--proof_recovery" >> $GITHUB_ENV

      - name: Checkout steel
        uses: actions/checkout@master
        with:
          path: starmalloc/
          repository: Inria-Prosecco/starmalloc

      - uses: mtzguido/gci-download@master
        with:
          name: karamel
      - uses: mtzguido/gci-download@master
        with:
          name: steel

      # AFAICT there are no starmalloc tests. Just `make all`
      # to verify, extract, and build.
      - name: Build
        run: make -C starmalloc all -skj$(nproc)

  secrefstar:
    runs-on: ubuntu-latest
    container: mtzguido/dev-base
    steps:
      - name: Cleanup
        run: sudo find . -delete
      - run: echo "HOME=/home/user" >> $GITHUB_ENV
      - uses: mtzguido/set-opam-env@master

      - uses: actions/download-artifact@v4
        with:
          name: fstar.tar.gz
      - run: tar -xzf fstar.tar.gz
      - run: echo "FSTAR_EXE=$(pwd)/fstar/bin/fstar.exe" >> $GITHUB_ENV
      - run: echo "OTHERFLAGS=--proof_recovery" >> $GITHUB_ENV

      - uses: actions/checkout@master
        with:
          path: repo/
          repository: andricicezar/fstar-io

      - name: Build
        run: make -C repo/secrefstar -skj$(nproc)
      - name: Build and run examples
        run: make -C repo/secrefstar -skj$(nproc) build-all

  sciostar:
    runs-on: ubuntu-latest
    container: mtzguido/dev-base
    steps:
      - name: Cleanup
        run: sudo find . -delete
      - run: echo "HOME=/home/user" >> $GITHUB_ENV
      - uses: mtzguido/set-opam-env@master

      - uses: actions/download-artifact@v4
        with:
          name: fstar.tar.gz
      - run: tar -xzf fstar.tar.gz
      - run: echo "FSTAR_EXE=$(pwd)/fstar/bin/fstar.exe" >> $GITHUB_ENV
      - run: echo "OTHERFLAGS=--proof_recovery" >> $GITHUB_ENV

      - uses: actions/checkout@master
        with:
          path: repo/
          repository: andricicezar/fstar-io

      - name: Build
        run: make -C repo/sciostar -skj$(nproc) verify

      - name: Verify and build case study
        run: make -C repo/sciostar/case-studies/webserver -skj$(nproc) build
