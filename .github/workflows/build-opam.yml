name: Build F* (opam)

# This builds F* by just calling `opam install .`. We don't thoroughly
# test this build but at least we check that it does work successfully.

on:
  workflow_call:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        ocamlv:
          - 4.14.2
          - 5.3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
        with:
          submodules: true

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocamlv }}

      - name: OPAM build
        run: opam install .

      - name: Install Z3
        run: sudo ./.scripts/get_fstar_z3.sh /usr/bin

      - name: Smoke test
        run: |
          eval $(opam env)
          echo -e "module A\nlet _ = assert (forall x. 1 + x*x > 0)" > A.fst
          fstar.exe A.fst
          echo -e "module B\n#lang-pulse\nopen Pulse\nfn test (x:int) returns int { (x+1); }" > B.fst
          fstar.exe B.fst
          # Check that karamel is there
          krml -version

      - name: Test sample F* applications
        # opam install . has already installed fstar.lib into the switch,
        # so building OCaml applications against it should just work.
        # tests/extraction includes mk/test.mk, which makes FSTAR_EXE
        # absolute, so we must pass the resolved path rather than relying
        # on it finding fstar.exe on the PATH.
        run: |
          eval $(opam env)
          FSTAR_EXE="$(command -v fstar.exe)"
          make -C tests/simple_hello FSTAR_EXE="$FSTAR_EXE"
          make -C tests/dune_hello FSTAR_EXE="$FSTAR_EXE"
          make -C tests/extraction FSTAR_EXE="$FSTAR_EXE"
